[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"scripts/stress_test_templates.py" = ["E402", "F403", "F405"]
"scripts/plugin_gate_advisor.py" = ["UP045"]
"tests/test_research_workflow_scripts.py" = ["B011"]
"src/data/audit_evcs_data.py" = ["E402"]
"src/data/fetch_acn_data.py" = ["E402"]
"src/data/build_evcs_tensor_cache.py" = ["E402"]
"src/data/merge_acn_sessions.py" = ["E402"]
"src/data/prepare_evcs_timeslices.py" = ["E402"]
"src/training/run_graph_ablation.py" = ["E402"]
"src/training/run_evcs_forecast.py" = ["E402"]
"src/training/train_exp103.py" = ["E402"]

[tool.coverage.run]
branch = true
source = ["scripts", "src"]
omit = ["*/scripts/stress_test_templates.py"]
patch = ["subprocess"]

[tool.coverage.report]
skip_empty = true
show_missing = true
omit = ["*/scripts/stress_test_templates.py"]
