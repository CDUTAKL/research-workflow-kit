[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"scripts/stress_test_templates.py" = ["E402", "F403", "F405"]
"tests/test_research_workflow_scripts.py" = ["B011"]

[tool.coverage.run]
branch = true
source = ["scripts"]
omit = ["*/scripts/stress_test_templates.py"]
patch = ["subprocess"]

[tool.coverage.report]
skip_empty = true
show_missing = true
omit = ["*/scripts/stress_test_templates.py"]
