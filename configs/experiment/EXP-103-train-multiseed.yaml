experiment_id: EXP-103
seed: 42
split: chronological_70_15_15
metric: MAE
output: outputs/EXP-103-train-multiseed
data:
  source_path: data/processed/evcs_timeslice.csv
  timestamp_field: timestamp
  node_field: node_id
  target_field: load
cache:
  tensor_cache_path: data/processed/evcs_tensor_cache.npz
  split_path: data/processed/splits/chronological_70_15_15.json
  manifest_path: data/processed/evcs_tensor_cache_manifest.json
  history_steps: 96
  horizon_steps: 4
  split_rule: {'train': 0.7, 'validation': 0.15, 'test': 0.15}
  auto_build: true
graph:
  event_feature_fields:
    - access_count
    - departure_count
    - active_count
    - occupancy_rate
    - demand_intensity
    - load_jump_flag
  similarity: cosine
  top_k: 5
  rho: 0.7
  dtw_max_points: 128
  dtw_cache_path: data/processed/graphs/dtw_demand_graph_top5_points128.npz
  verbose: true
training:
  epochs: 12
  batch_size: 256
  hidden_channels: 64
  tcn_layers: 4
  kernel_size: 3
  dropout: 0.1
  optimizer: AdamW
  lr: 0.001
  loss: SmoothL1
  early_stopping_patience: 3
  amp: true
  num_workers: 8
  pin_memory: true
  verbose: true
  write_full_predictions: false
progress:
  terminal_bar: true
  live_html: true
  refresh_seconds: 10
baselines:
  - no_graph
  - behavior_concat
  - event_graph_dynamic
  - dtw_demand_graph
  - historical_correlation_graph
  - random_event_graph
  - shuffled_event_graph
  - deleted_event_graph
